<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UK Crime Radius Analyzer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main>
      <h1>🕵️ UK Postcode Crime Analyzer</h1>
      <p>Enter a postcode, radius, and optional month range to see charts and incidents on the map.</p>

      <section class="panel">
        <form id="analysis-form">
          <label>UK Postcode
            <input id="postcode" required placeholder="e.g. SW1A 1AA" />
          </label>
          <label>Radius (m)
            <input id="radius" type="number" min="1" max="1000" value="300" required />
          </label>
          <label>Start month (optional)
            <input id="start-month" type="month" />
          </label>
          <label>End month (optional)
            <input id="end-month" type="month" />
          </label>
          <button type="submit">Run analysis</button>
        </form>
        <p id="status"></p>
      </section>

      <section class="grid">
        <div class="card"><h3>📍 Postcode</h3><p id="out-postcode">—</p></div>
        <div class="card"><h3>🚨 Total incidents</h3><p id="out-total">—</p></div>
        <div class="card"><h3>🥇 Top category</h3><p id="out-top">—</p></div>
      </section>

      <section class="panel"><canvas id="categoryChart"></canvas></section>
      <section class="panel"><canvas id="monthlyChart"></canvas></section>
      <section class="panel"><div id="map"></div></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/static/app.js"></script>
  </body>
</html>
