<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">We Support Ukraine Banner</title>
  <desc id="desc">Blue and yellow support banner with text We Support Ukraine and a flag icon.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#063a8a"/>
      <stop offset="100%" stop-color="#1a6ee8"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe766"/>
      <stop offset="100%" stop-color="#f2bf00"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#sky)"/>
  <path d="M0,520 C250,430 500,760 1200,520 L1200,700 L0,700 Z" fill="url(#sun)" opacity="0.95"/>

  <text x="70" y="250" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="110" font-weight="700">WE SUPPORT</text>
  <text x="70" y="390" fill="#ffd400" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="900">UKRAINE</text>

  <g transform="translate(930,105)">
    <rect x="0" y="0" width="180" height="120" rx="14" fill="#1a6ee8"/>
    <rect x="0" y="60" width="180" height="60" rx="0" fill="#ffd400"/>
    <rect x="-10" y="-20" width="10" height="180" fill="#1f2937"/>
  </g>
</svg>
